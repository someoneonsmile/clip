name: Nightly

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  # ── 检查是否有变更 ─────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last nightly
        id: check
        run: |
          if git rev-parse --verify nightly >/dev/null 2>&1; then
            if [ "$(git rev-parse nightly)" = "$(git rev-parse HEAD)" ]; then
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "No changes since last nightly, skipping."
            else
              echo "proceed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "First nightly build."
          fi

  # ── 三端构建 (matrix) ─────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: clip-x86_64-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: clip-x86_64-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: clip-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: clip-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: clip-aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: clip-x86_64-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (musl build)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'x86_64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (musl via cross)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/clip ${{ matrix.asset }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/clip.exe ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── 发布 nightly prerelease ───────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: .github/changelog-config.json
          fromTag: stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nightly rolling tag
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Delete old nightly rolling release
        run: gh release delete nightly --yes || true

      - name: Publish nightly rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          files: dist/*
          prerelease: true
          body: ${{ steps.changelog.outputs.changelog }}
