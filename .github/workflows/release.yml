name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: .github/changelog-config.json
          toTag: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old versioned release (in case tag was moved)
        run: gh release delete ${{ github.ref_name }} --yes || true

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.changelog }}

      - name: Update stable rolling tag
        run: |
          git tag -f stable
          git push -f origin stable

      - name: Delete old stable rolling release
        run: gh release delete stable --yes || true

      - name: Publish stable rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          files: dist/*
          body: ${{ steps.changelog.outputs.changelog }}
