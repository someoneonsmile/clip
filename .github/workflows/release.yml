name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]

permissions:
  contents: write

jobs:
  # ── 三端构建 (matrix) ─────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: clip-x86_64-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: clip-x86_64-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: clip-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: clip-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: clip-aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: clip-x86_64-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (musl build)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'x86_64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (musl via cross)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/clip ${{ matrix.asset }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/clip.exe ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── 发布 (收集所有产物，统一发版) ────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # ── 生成 Changelog（版本发版）─────────────────────────────────
      - name: Generate changelog (versioned)
        id: changelog
        if: startsWith(github.ref, 'refs/tags/v')
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: .github/changelog-config.json
          toTag: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Stable（推送 v* tag 时触发）─────────────────────────────
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.changelog }}

      - name: Update stable rolling tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git tag -f stable
          git push -f origin stable

      - name: Delete old stable rolling release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release delete stable --yes || true

      - name: Publish stable rolling release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          files: dist/*
          body: ${{ steps.changelog.outputs.changelog }}

      # ── 生成 Changelog（Nightly）─────────────────────────────────
      - name: Generate changelog (nightly)
        id: changelog_nightly
        if: github.ref == 'refs/heads/main'
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: .github/changelog-config.json
          fromTag: stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Nightly（推送 main 分支时触发）──────────────────────────
      - name: Update nightly rolling tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Delete old nightly rolling release
        if: github.ref == 'refs/heads/main'
        run: gh release delete nightly --yes || true

      - name: Publish nightly rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          files: dist/*
          prerelease: true
          body: ${{ steps.changelog_nightly.outputs.changelog }}
